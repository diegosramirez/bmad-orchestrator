name: BMAD Orchestrator — Start Run

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target repository (e.g. digistore24/inventory-distribution)"
        required: true
        default: "diegosramirez/my-test-app"
        type: string
      base_branch:
        description: "Base branch in target repo"
        required: false
        default: "main"
        type: string
      prompt:
        description: "Feature description or Jira story key (e.g. SAM1-54)"
        required: true
        type: string
      team_id:
        description: "Team identifier"
        required: true
        default: "SAM1"
        type: string
      run_id:
        description: "Run ID (auto-generated if empty)"
        required: false
        default: ""
        type: string
      # ── Skip nodes (checkboxes) ─────────────────────────────────────
      skip_check_epic_state:
        description: "Skip: Validate epic status in Jira"
        type: boolean
        default: false
      skip_create_or_correct_epic:
        description: "Skip: Create or update the epic"
        type: boolean
        default: false
      skip_create_story_tasks:
        description: "Skip: Generate stories and tasks"
        type: boolean
        default: false
      skip_party_mode_refinement:
        description: "Skip: Multi-agent story refinement"
        type: boolean
        default: false
      skip_detect_commands:
        description: "Skip: AI-detect build/test/lint commands"
        type: boolean
        default: false
      skip_dev_story:
        description: "Skip: Generate implementation code"
        type: boolean
        default: false
      skip_qa_automation:
        description: "Skip: Generate QA tests"
        type: boolean
        default: false
      skip_code_review:
        description: "Skip: Architect code review loop"
        type: boolean
        default: false
      skip_commit_and_push:
        description: "Skip: Git commit and push"
        type: boolean
        default: false
      skip_create_pull_request:
        description: "Skip: Create GitHub PR"
        type: boolean
        default: false
      # ── Other flags ──────────────────────────────────────────────────
      branch:
        description: "Existing branch to continue from (e.g. bmad/sam1/SAM1-54-improve-dashboard)"
        required: false
        default: ""
        type: string
      extra_flags:
        description: "Extra CLI flags (e.g. --epic-key PUG-123 --story-key PUG-456)"
        required: false
        default: ""
        type: string

jobs:
  orchestrator-run:
    name: Run BMAD Orchestrator
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      # ── Anthropic ──────────────────────────────────────────────────────
      BMAD_ANTHROPIC_API_KEY: ${{ secrets.BMAD_ANTHROPIC_API_KEY }}

      # ── Jira ───────────────────────────────────────────────────────────
      BMAD_JIRA_BASE_URL: ${{ secrets.BMAD_JIRA_BASE_URL }}
      BMAD_JIRA_USERNAME: ${{ secrets.BMAD_JIRA_USERNAME }}
      BMAD_JIRA_API_TOKEN: ${{ secrets.BMAD_JIRA_API_TOKEN }}
      BMAD_JIRA_PROJECT_KEY: ${{ secrets.BMAD_JIRA_PROJECT_KEY }}

      # ── GitHub (target repo) ───────────────────────────────────────────
      BMAD_GITHUB_REPO: ${{ inputs.target_repo }}
      BMAD_GITHUB_BASE_BRANCH: ${{ inputs.base_branch }}
      BMAD_GITHUB_TOKEN: ${{ secrets.BMAD_GH_PAT }}
      GH_TOKEN: ${{ secrets.BMAD_GH_PAT }}

      # ── Slack (optional) ───────────────────────────────────────────────
      BMAD_SLACK_NOTIFY: ${{ vars.BMAD_SLACK_NOTIFY || 'false' }}
      BMAD_SLACK_BOT_TOKEN: ${{ secrets.BMAD_SLACK_BOT_TOKEN }}
      BMAD_SLACK_CHANNEL: ${{ vars.BMAD_SLACK_CHANNEL }}

      # ── Orchestrator settings ──────────────────────────────────────────
      BMAD_DRAFT_PR: "true"
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: "128000"

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install orchestrator dependencies
        run: uv sync --dev

      - name: Generate run ID
        id: run-id
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            echo "id=${{ inputs.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "id=run-$(date +%s)-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone target repository
        run: |
          gh repo clone "${{ inputs.target_repo }}" target-repo -- --branch "${{ inputs.base_branch }}"

      - name: Configure git identity and auth
        working-directory: target-repo
        run: |
          git config user.name "BMAD Orchestrator"
          git config user.email "bmad@noreply.local"
          git config url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Checkout existing branch
        if: inputs.branch != ''
        working-directory: target-repo
        run: |
          git fetch origin "${{ inputs.branch }}"
          git checkout "${{ inputs.branch }}"

      - name: Build skip-nodes flag
        id: skip
        run: |
          nodes=""
          if [ "${{ inputs.skip_check_epic_state }}" = "true" ]; then nodes="$nodes,check_epic_state"; fi
          if [ "${{ inputs.skip_create_or_correct_epic }}" = "true" ]; then nodes="$nodes,create_or_correct_epic"; fi
          if [ "${{ inputs.skip_create_story_tasks }}" = "true" ]; then nodes="$nodes,create_story_tasks"; fi
          if [ "${{ inputs.skip_party_mode_refinement }}" = "true" ]; then nodes="$nodes,party_mode_refinement"; fi
          if [ "${{ inputs.skip_detect_commands }}" = "true" ]; then nodes="$nodes,detect_commands"; fi
          if [ "${{ inputs.skip_dev_story }}" = "true" ]; then nodes="$nodes,dev_story"; fi
          if [ "${{ inputs.skip_qa_automation }}" = "true" ]; then nodes="$nodes,qa_automation"; fi
          if [ "${{ inputs.skip_code_review }}" = "true" ]; then nodes="$nodes,code_review"; fi
          if [ "${{ inputs.skip_commit_and_push }}" = "true" ]; then nodes="$nodes,commit_and_push"; fi
          if [ "${{ inputs.skip_create_pull_request }}" = "true" ]; then nodes="$nodes,create_pull_request"; fi
          nodes="${nodes#,}"
          if [ -n "$nodes" ]; then
            echo "flag=--skip-nodes $nodes" >> "$GITHUB_OUTPUT"
            echo "Skipping nodes: $nodes"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
            echo "No nodes skipped"
          fi

      - name: Run orchestrator
        working-directory: target-repo
        env:
          BMAD_BMAD_INSTALL_DIR: ${{ github.workspace }}/.claude
          BMAD_BMAD_ROOT: ${{ github.workspace }}/_bmad
        run: |
          echo "::group::Run Configuration"
          echo "Target repo:  ${{ inputs.target_repo }}"
          echo "Base branch:  ${{ inputs.base_branch }}"
          echo "Team ID:      ${{ inputs.team_id }}"
          echo "Run ID:       ${{ steps.run-id.outputs.id }}"
          echo "Prompt:       ${{ inputs.prompt }}"
          echo "Skip nodes:   ${{ steps.skip.outputs.flag }}"
          echo "Extra flags:  ${{ inputs.extra_flags }}"
          echo "::endgroup::"

          echo "::group::Running bmad-orchestrator"
          uv run --project "${{ github.workspace }}" \
            bmad-orchestrator run \
            --team-id "${{ inputs.team_id }}" \
            --prompt "${{ inputs.prompt }}" \
            --non-interactive \
            ${{ steps.skip.outputs.flag }} \
            ${{ inputs.extra_flags }}
          echo "::endgroup::"

      - name: Upload orchestrator state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bmad-state-${{ steps.run-id.outputs.id }}
          path: ~/.bmad/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload orchestrator logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bmad-logs-${{ steps.run-id.outputs.id }}
          path: ~/.bmad/logs/
          retention-days: 30
          if-no-files-found: warn
