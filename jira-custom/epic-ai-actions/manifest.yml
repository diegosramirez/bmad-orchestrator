permissions:
  # Read issue fields (target repo + branch; ids configurable via Forge env vars).
  scopes:
    - read:jira-work
    - write:jira-work
  external:
    fetch:
      backend:
        # Replace with the public HTTPS origin of your BMAD FastAPI webhook (no path). Redeploy after editing.
        - 'https://service-ai-lemon.vercel.app/'

modules:
  jira:issuePanel:
    - key: bmad-epic-panel
      resource: epic-main
      resolver:
        function: resolver
      render: native
      title: BMAD Epic
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
    - key: bmad-ai-comments-panel
      resource: comment-apps-main
      resolver:
        function: resolver
      render: native
      title: AI Comments
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
    - key: bmad-story-dev-panel
      resource: story-dev-main
      resolver:
        function: resolver
      render: native
      title: BMAD Story
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: epic-main
    path: src/frontend/epic-panel-index.jsx
  - key: comment-apps-main
    path: src/frontend/comment-apps-index.jsx
  - key: story-dev-main
    path: src/frontend/story-dev-panel-index.jsx
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/27b91fad-3b4a-4e18-aa7c-86d437ceca5e
